<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Guitar Triads Tool</title>
<link rel="stylesheet" href="style.css?v=10" />
</head>
<body>

<div class="desktop" id="desktop"></div>

<template id="xpWindowTemplate">
  <div class="xp-window">
    <div class="titlebar">
      <div class="titlebar-left">
        <span class="titlebar-icon">&#9834;</span>
        <span class="titlebar-text">GuitarTriads98.exe - Scale &amp; Triad Explorer</span>
      </div>
      <div class="titlebar-btns">
        <button class="tb-btn tb-min" title="Minimize">_</button>
        <button class="tb-btn tb-max" title="Maximize">&#9633;</button>
        <button class="tb-btn tb-close" title="Close">&#10005;</button>
      </div>
    </div>

    <div class="menubar">
      <span class="menu-item menu-file">File</span>
      <span class="menu-item">Edit</span>
      <span class="menu-item">View</span>
      <span class="menu-item">Help</span>
      <div class="menu-dropdown hidden">
        <div class="menu-option opt-new">New Window</div>
        <div class="menu-option opt-close">Close</div>
      </div>
    </div>

    <div class="window-body">

      <div class="controls-row">
        <fieldset class="groupbox">
          <legend>Key</legend>
          <select class="keySelect"></select>
        </fieldset>

        <fieldset class="groupbox">
          <legend>Scale</legend>
          <select class="scaleSelect">
            <option value="major">Major (Ionian)</option>
            <option value="minor">Natural Minor (Aeolian)</option>
            <option value="majorPent">Major Pentatonic</option>
            <option value="minorPent">Minor Pentatonic</option>
          </select>
        </fieldset>

        <fieldset class="groupbox">
          <legend>Note Display</legend>
          <div class="radio-row">
            <label><input type="radio" class="displayModeRadio" value="dots" checked> Dots</label>
            <label><input type="radio" class="displayModeRadio" value="notes"> Note Names</label>
            <label><input type="radio" class="displayModeRadio" value="degrees"> Relative (1-7)</label>
          </div>
        </fieldset>

        <fieldset class="groupbox">
          <legend>Options</legend>
          <div class="radio-row">
            <label><input type="checkbox" class="showScaleToggle" checked> Show scale notes</label>
            <label><input type="checkbox" class="leftyToggle"> Lefty flip</label>
            <label><input type="checkbox" class="flipVToggle"> Flip vertical</label>
          </div>
        </fieldset>
      </div>

      <div class="fretboard-panel sunken">
        <div class="fretboardScroll">
          <svg class="fretboardSvg" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
      </div>

      <fieldset class="groupbox triad-groupbox">
        <legend>Triads for Soloing</legend>
        <div class="triad-controls">
          <label class="triad-enable"><input type="checkbox" class="showTriadToggle"> Highlight triad:</label>
          <select class="triadDegreeSelect"></select>

          <span class="string-set-label">on string sets:</span>
          <label><input type="checkbox" class="stringSetChk" value="0,1,2"> E-A-D (low)</label>
          <label><input type="checkbox" class="stringSetChk" value="1,2,3"> A-D-G</label>
          <label><input type="checkbox" class="stringSetChk" value="2,3,4" checked> D-G-B</label>
          <label><input type="checkbox" class="stringSetChk" value="3,4,5" checked> G-B-E (high)</label>
        </div>
        <div class="triad-legend">
          <span class="legend-chip role-R">R</span> Root
          <span class="legend-chip role-3">3</span> Third
          <span class="legend-chip role-5">5</span> Fifth
          <span class="legend-sep">|</span>
          <span class="triadReadout">Pick a degree and check "Highlight triad" to see shapes.</span>
        </div>
      </fieldset>

    </div>

    <div class="statusbar">
      <div class="status-cell statusKey">Key: C</div>
      <div class="status-cell statusScale">Scale: Major</div>
      <div class="status-cell statusTriad">Triad: off</div>
    </div>
  </div>
</template>

<div class="taskbar">
  <div class="start-btn" id="startBtn"><span class="start-flag">&#10052;</span> Start</div>
  <div class="taskbar-apps" id="taskbarApps"></div>
  <div class="taskbar-clock" id="taskbarClock">12:00 PM</div>
</div>

<div class="start-menu hidden" id="startMenu">
  <div class="start-menu-item" id="startNewWindow"><span class="start-menu-icon">&#9834;</span> GuitarTriads98.exe</div>
</div>

<script src="app.js?v=10"></script>
</body>
</html>
